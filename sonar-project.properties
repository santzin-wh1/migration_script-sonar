# SonarCloud — ajuste projectKey/organization conforme o que o SonarCloud
# exibir ao importar o repo (normalmente <login>_<repo> e <login>).
sonar.projectKey=santzin-wh1_migration_script-sonar
sonar.organization=santzin-wh1

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/*_test.go

# cobertura gerada por `go test -coverprofile=coverage.out ./...`
sonar.go.coverage.reportPaths=coverage.out
sonar.sourceEncoding=UTF-8
